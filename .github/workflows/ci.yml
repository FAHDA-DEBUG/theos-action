name: CI
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          mkdir -p ~/theos/sdks
          tar -xf master.tar.gz -C ~/theos/sdks --strip-components=1
          echo "THEOS=~/theos" >> $GITHUB_ENV
      - name: Build Tweak
        run: |
          make package
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: TripleLayerGuard-Dylib
          path: packages/*.deb
