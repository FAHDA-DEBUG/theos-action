name: ONYX Elite Compiler
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # يتيح لك تشغيل التجميع يدوياً

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
      - name: Setup SDK (iOS 14.5)
        run: |
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Compile ONYX Elite (.dylib)
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1
          
      - name: Upload ONYX Product
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-Elite-Package
          path: |
            packages/*.deb
            .theos/obj/debug/*.dylib
