name: ONYX Elite Final Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C /opt/theos/sdks
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Compile ONYX (.dylib)
        run: |
          export THEOS=/opt/theos
          # تنظيف التجميع القديم قبل البدء
          make clean
          make package FINALPACKAGE=1
        
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ONYX-Elite-Final
          path: |
            .theos/obj/debug/*.dylib
            packages/*.deb
